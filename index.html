<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <title>경주 여행 · 민주 희주 나원</title>
  <meta name="theme-color" content="#38BDF8" />
  <meta name="description" content="2026년 8월 경주 여행 계획 공유" />

  <!-- 홈 화면 추가 시 전체화면 앱처럼 동작 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="경주 여행" />

  <!-- Pretendard font -->
  <link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <style>
/* ================================
   경주 여행 - 여름 바캉스 스타일
   ================================ */

:root {
  /* Brand */
  --sky: #38BDF8;
  --sky-deep: #0284C7;
  --sky-soft: #E0F2FE;
  --coral: #FF7A6B;
  --coral-deep: #E85A4B;
  --coral-soft: #FFE4E0;
  --sun: #FFD84D;
  --sun-soft: #FFF4C7;
  --sand: #FFF7ED;
  --mint: #6EE7B7;
  --lavender: #C4B5FD;

  /* Neutrals */
  --canvas: #FFFFFF;
  --surface-soft: #F8FAFC;
  --hairline: #E2E8F0;
  --hairline-soft: #F1F5F9;
  --ink-deep: #0F172A;
  --ink: #1E293B;
  --charcoal: #334155;
  --slate: #475569;
  --steel: #64748B;
  --stone: #94A3B8;

  /* Semantic */
  --success: #10B981;
  --warning: #F59E0B;
  --critical: #EF4444;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --r-xxl: 28px;
  --r-full: 999px;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
  --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12);

  /* Layout */
  --app-max: 480px;
  --tabbar-h: 72px;
  --header-h: 64px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: var(--ink-deep);
  background: linear-gradient(180deg, #E0F2FE 0%, #FEF3C7 50%, #FFF7ED 100%);
  background-attachment: fixed;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--sky-deep);
  text-decoration: none;
}

/* ================================
   App Shell
   ================================ */
.app {
  max-width: var(--app-max);
  margin: 0 auto;
  min-height: 100vh;
  background: var(--canvas);
  position: relative;
  padding-bottom: calc(var(--tabbar-h) + 20px);
  box-shadow: 0 0 40px rgba(15, 23, 42, 0.06);
}

/* ================================
   Header
   ================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  height: calc(var(--header-h) + env(safe-area-inset-top));
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--hairline-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: env(safe-area-inset-top) 16px 0;
}

.header-back {
  width: 40px;
  height: 40px;
  border-radius: var(--r-full);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
}
.header-back:active { background: var(--surface-soft); }

.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.2px;
}

.header-me {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  background: var(--sky-soft);
  color: var(--sky-deep);
  font-size: 12px;
  font-weight: 700;
  border: 1.5px solid transparent;
}
.header-me .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ================================
   Screens
   ================================ */
.screen {
  display: none;
  padding: 16px;
  animation: fadeIn 0.25s ease-out;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================================
   HOME - Hero Card
   ================================ */
.hero-card {
  position: relative;
  border-radius: var(--r-xxl);
  padding: 16px 20px;
  background: linear-gradient(135deg, #38BDF8 0%, #7DD3FC 50%, #FFD84D 100%);
  color: white;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.18);
}
.hero-card::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: -30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(255, 122, 107, 0.35);
}

.hero-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.hero-title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-top: 4px;
  position: relative;
  z-index: 1;
  line-height: 1.2;
  white-space: nowrap;
}

.hero-sub {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.dday-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  z-index: 1;
}
.dday-num {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
}
.dday-label {
  font-size: 20px;
  font-weight: 800;
  opacity: 0.95;
}

/* Weather chip */
.weather-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--r-full);
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(8px);
  margin-top: 14px;
  font-size: 13px;
  font-weight: 600;
  position: relative;
  z-index: 1;
}
.weather-chip .w-icon { font-size: 16px; }

/* ================================
   Members row
   ================================ */
.members-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding: 4px 0;
}
.member-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px 8px 6px;
  background: white;
  border: 1px solid var(--hairline);
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}
.member-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ================================
   Section Grid (Home menu)
   ================================ */
.section-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin: 20px 0 12px;
  color: var(--ink-deep);
}
.section-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 20px 0 12px;
}
.section-title-row .section-title { margin: 0; }
.section-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--steel);
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.menu-card {
  position: relative;
  background: white;
  border-radius: var(--r-xl);
  padding: 18px 16px 16px;
  text-align: left;
  border: 1px solid var(--hairline-soft);
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  overflow: hidden;
}
.menu-card:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-sm);
}
.menu-card .icon-blob {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 10px;
}
.menu-card .title {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-deep);
  letter-spacing: -0.2px;
}
.menu-card .meta {
  font-size: 11px;
  color: var(--steel);
  margin-top: 3px;
  font-weight: 500;
}

/* icon variants */
.icon-blob.b-sky { background: var(--sky-soft); color: var(--sky-deep); }
.icon-blob.b-coral { background: var(--coral-soft); color: var(--coral-deep); }
.icon-blob.b-sun { background: var(--sun-soft); color: #B45309; }
.icon-blob.b-mint { background: #D1FAE5; color: #047857; }
.icon-blob.b-lavender { background: #EDE9FE; color: #6D28D9; }
.icon-blob.b-sand { background: var(--sand); color: #92400E; }
.icon-blob.b-rose { background: #FFE4E6; color: #BE123C; }
.icon-blob.b-slate { background: var(--surface-soft); color: var(--charcoal); }

/* ================================
   Tab Bar
   ================================ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--app-max);
  height: var(--tabbar-h);
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--hairline-soft);
  display: flex;
  align-items: stretch;
  z-index: 40;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: var(--stone);
  font-size: 11px;
  font-weight: 600;
  transition: color 0.15s;
}
.tab-btn svg { width: 22px; height: 22px; }
.tab-btn.active {
  color: var(--sky-deep);
}

/* ================================
   List Items (일정, 위시, 음식 etc)
   ================================ */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.list-item {
  background: white;
  border: 1px solid var(--hairline-soft);
  border-radius: var(--r-lg);
  padding: 14px 14px 12px;
  position: relative;
  transition: border-color 0.15s;
}
.list-item .item-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.list-item .item-body {
  flex: 1;
  min-width: 0;
}
.list-item .item-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink-deep);
  letter-spacing: -0.2px;
  word-break: break-word;
}
.list-item .item-desc {
  font-size: 13px;
  color: var(--charcoal);
  margin-top: 4px;
  word-break: break-word;
  white-space: pre-wrap;
  line-height: 1.55;
}
.list-item .item-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--steel);
  flex-wrap: wrap;
}
.item-foot .by {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px 3px 3px;
  background: var(--surface-soft);
  border-radius: var(--r-full);
  font-weight: 600;
  color: var(--charcoal);
}
.item-foot .by .mini-avatar {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.item-foot .dot-sep { color: var(--stone); }

.item-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--steel);
}
.icon-btn:active { background: var(--surface-soft); }
.icon-btn.danger { color: var(--critical); }
.icon-btn svg { width: 16px; height: 16px; }

/* Checkbox row (준비물) */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
}
.check-box {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: white;
  color: white;
  transition: all 0.15s;
}
.check-box.checked {
  background: var(--sky);
  border-color: var(--sky);
}
.check-box.checked::after {
  content: '';
  width: 10px;
  height: 6px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px);
}
.check-item.checked .item-title {
  text-decoration: line-through;
  color: var(--stone);
}

/* Day header (일정표) */
.day-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 8px 0 10px;
  padding-top: 4px;
}
.day-badge {
  padding: 4px 12px;
  background: var(--sky);
  color: white;
  font-size: 12px;
  font-weight: 800;
  border-radius: var(--r-full);
  letter-spacing: 0.5px;
}
.day-date {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}
.day-weekday {
  font-size: 13px;
  color: var(--steel);
  font-weight: 500;
}

.schedule-time {
  display: inline-block;
  padding: 3px 10px;
  background: var(--sun-soft);
  color: #B45309;
  font-size: 11px;
  font-weight: 700;
  border-radius: var(--r-full);
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

/* Add button (FAB style at bottom of list) */
.add-btn {
  width: 100%;
  padding: 14px;
  background: white;
  border: 2px dashed var(--hairline);
  border-radius: var(--r-lg);
  color: var(--steel);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.add-btn:active {
  border-color: var(--sky);
  color: var(--sky-deep);
  background: var(--sky-soft);
}

/* ================================
   Buttons
   ================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 22px;
  border-radius: var(--r-full);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.1px;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--sky);
  color: white;
}
.btn-primary:active { background: var(--sky-deep); }
.btn-coral {
  background: var(--coral);
  color: white;
}
.btn-coral:active { background: var(--coral-deep); }
.btn-ink {
  background: var(--ink-deep);
  color: white;
}
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--hairline);
}
.btn-block { width: 100%; }
.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* ================================
   Modals
   ================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.active {
  display: flex;
  animation: fadeIn 0.2s ease-out;
}
.modal {
  width: 100%;
  max-width: var(--app-max);
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--hairline);
  border-radius: 4px;
  margin: 0 auto 16px;
}
.modal-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin-bottom: 16px;
}
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-actions .btn { flex: 1; }

/* Form fields */
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--charcoal);
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-md);
  background: white;
  font-size: 15px;
  transition: border-color 0.15s;
  color: var(--ink-deep);
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: var(--sky);
}
.field textarea {
  resize: vertical;
  min-height: 90px;
  font-family: inherit;
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Nickname picker */
.nickname-suggests {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.nick-chip {
  padding: 10px 18px;
  border-radius: var(--r-full);
  background: white;
  border: 1.5px solid var(--hairline);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  transition: all 0.15s;
}
.nick-chip:active, .nick-chip.selected {
  background: var(--sky);
  border-color: var(--sky);
  color: white;
}

/* ================================
   Nickname Onboarding Screen
   ================================ */
.onboard-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.onboard-card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: var(--r-xxl);
  padding: 32px 24px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.onboard-illust {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--sky) 0%, var(--sun) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  box-shadow: 0 8px 20px rgba(56, 189, 248, 0.35);
}
.onboard-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.onboard-sub {
  font-size: 14px;
  color: var(--steel);
  margin-bottom: 24px;
  line-height: 1.55;
}

/* ================================
   Empty state
   ================================ */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--stone);
}
.empty-icon {
  font-size: 42px;
  margin-bottom: 10px;
  opacity: 0.6;
}
.empty-text {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--steel);
}
.empty-hint {
  font-size: 12px;
  color: var(--stone);
}

/* ================================
   Activity Timeline
   ================================ */
.timeline {
  position: relative;
  padding-left: 22px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--hairline);
}
.tl-item {
  position: relative;
  padding: 6px 0 14px 8px;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 10px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--sky);
  border: 2px solid white;
  box-shadow: 0 0 0 1.5px var(--sky);
}
.tl-item.add::before { background: var(--success); box-shadow: 0 0 0 1.5px var(--success); }
.tl-item.edit::before { background: var(--warning); box-shadow: 0 0 0 1.5px var(--warning); }
.tl-item.remove::before { background: var(--critical); box-shadow: 0 0 0 1.5px var(--critical); }

   - 닉네임 등록 → 홈 → 각 섹션 CRUD → 활동 타임라인
================================================================ */

(function () {
  'use strict';

  // ------------------------------------------------
  // 0. 유틸
  // ------------------------------------------------
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => Date.now();

  const MEMBER_COLORS = {
    '민주': '#38BDF8',
    '희주': '#FF7A6B',
    '나원': '#FFB020'
  };
  const fallbackColors = ['#8B5CF6', '#10B981', '#EC4899', '#F59E0B', '#0EA5E9'];
  function colorFor(name) {
    if (MEMBER_COLORS[name]) return MEMBER_COLORS[name];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return fallbackColors[h % fallbackColors.length];
  }
  function initial(name) { return (name || '?').trim().charAt(0); }

  function fmtDate(d) {
    const dt = new Date(d);
    return `${dt.getMonth() + 1}월 ${dt.getDate()}일`;
  }
  function fmtDateTime(t) {
    const dt = new Date(t);
    const today = new Date();
    const isToday = dt.toDateString() === today.toDateString();
    const yst = new Date(today); yst.setDate(today.getDate() - 1);
    const isYst = dt.toDateString() === yst.toDateString();
    const hh = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');
    if (isToday) return `오늘 ${hh}:${mm}`;
    if (isYst) return `어제 ${hh}:${mm}`;
    return `${dt.getMonth() + 1}/${dt.getDate()} ${hh}:${mm}`;
  }
  function weekday(dateStr) {
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    return days[new Date(dateStr).getDay()] + '요일';
  }

  function toast(msg) {
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  // 1. 데이터 스토어 (Firebase 또는 localStorage)
  // ------------------------------------------------
  const TRIP = window.TRIP_INFO || {};
  const CFG = window.FIREBASE_CONFIG || {};
  const ROOM = TRIP.roomId || 'trip-room';
  const LS_KEY = `trip_data_${ROOM}`;
  const LS_ME = `trip_me_${ROOM}`;

  const demoSchedule = () => ([
    { id: uid(), day: 1, time: '09:00', title: 'KTX 경주역 도착', desc: '역 앞에서 집합 후 렌터카 픽업', by: '민주', at: now() },
    { id: uid(), day: 1, time: '10:30', title: '대릉원 & 첨성대', desc: '천마총 관람, 사진 촬영', by: '희주', at: now() },
    { id: uid(), day: 1, time: '12:30', title: '황리단길 점심', desc: '맛집 리스트 참고', by: '나원', at: now() },
    { id: uid(), day: 1, time: '15:00', title: '불국사 & 석굴암', desc: '입장권 미리 확인', by: '민주', at: now() },
    { id: uid(), day: 1, time: '18:30', title: '숙소 체크인 & 저녁', desc: '', by: '희주', at: now() },
    { id: uid(), day: 2, time: '09:30', title: '동궁과 월지 산책', desc: '오전 조용할 때 방문', by: '나원', at: now() },
    { id: uid(), day: 2, time: '11:00', title: '보문관광단지', desc: '경주월드 or 호수 산책 선택', by: '민주', at: now() },
    { id: uid(), day: 2, time: '13:00', title: '점심 & 카페', desc: '', by: '희주', at: now() },
    { id: uid(), day: 2, time: '15:00', title: '경주역 출발', desc: '기념품 구매 후 이동', by: '나원', at: now() }
  ]);

  const emptyData = () => ({
    schedule: demoSchedule(),   // {id, day, time, title, desc, by, at, editedBy, editedAt}
    wishlist: [],   // {id, title, desc, mapUrl, by, at, ...}
    foods: [],
    checklist: [],  // {id, title, checked, by, at, checkedBy, checkedAt}
    budget: [],     // {id, title, amount, category, by, at}
    stay: { content: '', by: '', at: 0 },
    transport: { content: '', by: '', at: 0 },
    memos: [],      // 자유 게시판 글: {id, name, body, at}
    activity: []    // 이력 로그
  });

  const store = {
    mode: 'local',   // 'firebase' | 'local'
    data: emptyData(),
    me: null,
    listeners: [],
    fbRef: null,
    _skipNextRemote: false,

    onChange(fn) { this.listeners.push(fn); },
    emit() { this.listeners.forEach(fn => fn(this.data)); },

    async init() {
      // load me
      try { this.me = JSON.parse(localStorage.getItem(LS_ME) || 'null'); } catch (e) { this.me = null; }

      // try firebase
      const hasFb = CFG.apiKey && CFG.databaseURL && window.firebase;
      if (hasFb) {
        try {
          if (!firebase.apps.length) firebase.initializeApp(CFG);
          this.fbRef = firebase.database().ref(`rooms/${ROOM}`);
          this.mode = 'firebase';
          // realtime listener
          this.fbRef.on('value', (snap) => {
            const val = snap.val();
            if (val) {
              this.data = Object.assign(emptyData(), val);
              // ensure arrays
              ['schedule', 'wishlist', 'foods', 'checklist', 'budget', 'memos', 'activity'].forEach(k => {
                if (!Array.isArray(this.data[k])) this.data[k] = [];
              });
              if (!this.data.stay) this.data.stay = { content: '', by: '', at: 0 };
              if (!this.data.transport) this.data.transport = { content: '', by: '', at: 0 };
            } else {
              this.data = emptyData();
            }
            this.emit();
            updateSyncPill('online');
          }, (err) => {
            console.warn('Firebase read err', err);
            this.mode = 'local';
            updateSyncPill('local');
          });
          return;
        } catch (e) {
          console.warn('Firebase init failed, falling back:', e);
          this.mode = 'local';
        }
      }

      // localStorage load
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) this.data = Object.assign(emptyData(), JSON.parse(raw));
      } catch (e) {}
      updateSyncPill('local');
      // emit next tick so listeners bind first
      setTimeout(() => this.emit(), 0);
    },

    async save() {
      if (this.mode === 'firebase' && this.fbRef) {
        try {
          await this.fbRef.set(this.data);
        } catch (e) {
          console.warn('Firebase save err', e);
          toast('저장 실패 — 잠시 후 다시 시도');
        }
      } else {
        try { localStorage.setItem(LS_KEY, JSON.stringify(this.data)); } catch (e) {}
        this.emit();
      }
    },

    setMe(name) {
      this.me = { name, joinedAt: now() };
      try { localStorage.setItem(LS_ME, JSON.stringify(this.me)); } catch (e) {}
    },

    // 활동 로그 추가 (최근 100개)
    log(type, section, title, extra) {
      const item = {
        id: uid(),
        type,       // 'add' | 'edit' | 'remove' | 'check' | 'uncheck' | 'comment'
        section,    // 'schedule' | 'wishlist' | ...
        title: title || '',
        by: this.me ? this.me.name : '알수없음',
        at: now(),
        extra: extra || ''
      };
      this.data.activity = [item, ...(this.data.activity || [])].slice(0, 100);
    }
  };

  function updateSyncPill(state) {
    const p = $('#syncPill');
    if (!p) return;
    p.classList.remove('online', 'local');
    if (state === 'online') {
      p.classList.add('online');
      p.querySelector('.sync-text').textContent = '실시간 동기화 중';
    } else {
      p.classList.add('local');
      p.querySelector('.sync-text').textContent = '로컬 저장 모드';
    }
  }

  // ------------------------------------------------
  // 2. 라우터 (해시 기반)
  // ------------------------------------------------
  const SECTIONS = {
    home: '홈',
    schedule: '일정표',
    wishlist: '가고 싶은 장소',
    foods: '먹고 싶은 음식',
    checklist: '준비물',
    budget: '예산 · 비용 분담',
    stay: '숙소 정보',
    transport: '교통편',
    memos: '자유 게시판',
    activity: '수정 이력',
    settings: '설정'
  };

  function navigate(name) {
    if (!SECTIONS[name]) name = 'home';
    location.hash = '#' + name;
  }
  function currentRoute() {
    const h = (location.hash || '').replace('#', '');
    return SECTIONS[h] ? h : 'home';
  }

  function renderRoute() {
    if (!store.me) {
      $('#onboarding').classList.remove('hidden');
      $('#appShell').classList.add('hidden');
      return;
    }
    $('#onboarding').classList.add('hidden');
    $('#appShell').classList.remove('hidden');

    const route = currentRoute();
    $$('.screen').forEach(s => s.classList.remove('active'));
    const target = $(`#screen-${route}`);
    if (target) target.classList.add('active');

    // Header
    const isHome = route === 'home';
    $('#headerBack').classList.toggle('hidden', isHome);
    $('#headerTitle').textContent = isHome ? '경주 여행' : SECTIONS[route];
    $('#headerMe').classList.toggle('hidden', !isHome);

    // Tabs
    $$('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === route ||
        (route !== 'activity' && route !== 'settings' && b.dataset.tab === 'home'));
    });

    // Render each screen
    if (route === 'home') renderHome();
    else if (route === 'schedule') renderSchedule();
    else if (route === 'wishlist') renderWishlist();
    else if (route === 'foods') renderFoods();
    else if (route === 'checklist') renderChecklist();
    else if (route === 'budget') renderBudget();
    else if (route === 'stay') renderStay();
    else if (route === 'transport') renderTransport();
    else if (route === 'memos') renderMemos();
    else if (route === 'activity') renderActivity();
    else if (route === 'settings') renderSettings();

    window.scrollTo(0, 0);
  }

  // ------------------------------------------------
  // 3. 홈
  // ------------------------------------------------
  function calcDday() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const start = new Date(TRIP.startDate); start.setHours(0, 0, 0, 0);
    const diff = Math.round((start - today) / 86400000);
    if (diff > 0) return { label: 'D -', num: diff };
    if (diff === 0) return { label: 'D', num: 'DAY' };
    return { label: 'D +', num: Math.abs(diff) };
  }

  function renderHome() {
    const dd = calcDday();
    $('#ddayNum').textContent = dd.num;
    $('#ddayLabel').textContent = dd.label + (typeof dd.num === 'number' ? '' : '');
    if (typeof dd.num !== 'number') {
      $('#ddayNum').style.fontSize = '38px';
    }

    const start = new Date(TRIP.startDate);
    const end = new Date(TRIP.endDate);
    $('#tripDates').textContent =
      `${start.getFullYear()}. ${start.getMonth() + 1}. ${start.getDate()} ~ ${end.getMonth() + 1}. ${end.getDate()} · ${weekday(TRIP.startDate).slice(0, 1)}·${weekday(TRIP.endDate).slice(0, 1)}`;

    // members
    const mr = $('#membersRow');
    mr.innerHTML = TRIP.members.map(n => `
      <div class="member-chip">
        <div class="member-avatar" style="background:${colorFor(n)}">${escapeHtml(initial(n))}</div>
        <span>${escapeHtml(n)}</span>
      </div>
    `).join('');

    // header me
    const me = store.me.name;
    $('#headerMe').innerHTML = `<span class="dot" style="background:${colorFor(me)}"></span><span>${escapeHtml(me)}</span>`;
    $('#headerMe').style.background = colorFor(me) + '22';
    $('#headerMe').style.color = colorFor(me);

    // counts
    const d = store.data;
    $('#cnt-schedule').textContent = d.schedule.length ? `${d.schedule.length}건` : '비어 있음';
    $('#cnt-wishlist').textContent = d.wishlist.length ? `${d.wishlist.length}곳` : '비어 있음';
    $('#cnt-foods').textContent = d.foods.length ? `${d.foods.length}개` : '비어 있음';
    const done = d.checklist.filter(i => i.checked).length;
    $('#cnt-checklist').textContent = d.checklist.length ? `${done}/${d.checklist.length}` : '비어 있음';
    const total = d.budget.reduce((s, b) => s + (Number(b.amount) || 0), 0);
    $('#cnt-budget').textContent = total ? `${total.toLocaleString()}원` : '비어 있음';
    $('#cnt-stay').textContent = d.stay.content ? '작성됨' : '비어 있음';
    $('#cnt-transport').textContent = d.transport.content ? '작성됨' : '비어 있음';
    $('#cnt-memos').textContent = d.memos.length ? `${d.memos.length}개` : '비어 있음';
  }

  // 날씨 (Open-Meteo, 무료 / 키 없음)
  async function fetchWeather() {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${TRIP.lat}&longitude=${TRIP.lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FSeoul&start_date=${TRIP.startDate}&end_date=${TRIP.endDate}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('weather http ' + r.status);
      const j = await r.json();
      const wchip = $('#weatherChip');
      const today = j.current;
      const wdesc = weatherText(today.weather_code);
      wchip.innerHTML = `<span class="w-icon">${weatherEmoji(today.weather_code)}</span>
        <span>지금 경주 ${Math.round(today.temperature_2m)}° · ${wdesc}</span>`;
      // trip days forecast
      if (j.daily && j.daily.time) {
        const tips = j.daily.time.map((d, i) =>
          `${fmtDate(d)} ${weatherEmoji(j.daily.weather_code[i])} ${Math.round(j.daily.temperature_2m_min[i])}° ~ ${Math.round(j.daily.temperature_2m_max[i])}°`
        ).join('  ·  ');
        $('#weatherForecast').textContent = tips;
      }
    } catch (e) {
      $('#weatherChip').innerHTML = `<span class="w-icon">☁️</span><span>날씨 정보 불러오는 중…</span>`;
    }
  }
  function weatherEmoji(code) {
    if (code == null) return '☁️';
    if (code === 0) return '☀️';
    if (code <= 2) return '🌤️';
    if (code === 3) return '☁️';
    if (code >= 45 && code <= 48) return '🌫️';
    if (code >= 51 && code <= 67) return '🌧️';
    if (code >= 71 && code <= 77) return '❄️';
    if (code >= 80 && code <= 82) return '🌦️';
    if (code >= 95) return '⛈️';
    return '☁️';
  }
  function weatherText(code) {
    if (code === 0) return '맑음';
    if (code <= 2) return '대체로 맑음';
    if (code === 3) return '흐림';
    if (code >= 45 && code <= 48) return '안개';
    if (code >= 51 && code <= 67) return '비';
    if (code >= 71 && code <= 77) return '눈';
    if (code >= 80 && code <= 82) return '소나기';
    if (code >= 95) return '뇌우';
    return '흐림';
  }

  // ------------------------------------------------
  // 4. 공통 CRUD 렌더 헬퍼
  // ------------------------------------------------
  function metaLine(item) {
    const by = item.by || '?';
    const at = item.at ? fmtDateTime(item.at) : '';
    const edited = item.editedBy && item.editedBy !== item.by;
    const editedAt = item.editedAt ? fmtDateTime(item.editedAt) : '';
    let html = `
      <span class="by">
        <span class="mini-avatar" style="background:${colorFor(by)}">${escapeHtml(initial(by))}</span>
        ${escapeHtml(by)}
      </span>
      <span class="dot-sep">·</span>
      <span>${at}</span>
    `;
    if (edited || (item.editedAt && item.editedAt !== item.at)) {
      html += `<span class="dot-sep">·</span><span style="color:var(--warning);font-weight:600">${escapeHtml(item.editedBy || by)} 수정 ${editedAt}</span>`;
    }
    return html;
  }

  function itemActions(section, id) {
    return `
      <div class="item-actions">
        <button class="icon-btn" data-act="edit" data-section="${section}" data-id="${id}" aria-label="수정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" data-act="delete" data-section="${section}" data-id="${id}" aria-label="삭제">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    `;
  }

  function emptyState(text, hint) {
    return `
      <div class="empty">
        <div class="empty-icon">🏖️</div>
        <div class="empty-text">${escapeHtml(text)}</div>
        <div class="empty-hint">${escapeHtml(hint || '')}</div>
      </div>
    `;
  }

  // ------------------------------------------------
  // 5. 일정표
  // ------------------------------------------------
  function renderSchedule() {
    const container = $('#screen-schedule .list-body');
    const items = store.data.schedule.slice().sort((a, b) => {
      if (a.day !== b.day) return a.day - b.day;
      return (a.time || '').localeCompare(b.time || '');
    });

    const days = [
      { day: 1, date: TRIP.startDate },
      { day: 2, date: TRIP.endDate }
    ];

    let html = '';
    days.forEach(d => {
      const dayItems = items.filter(i => i.day === d.day);
      html += `
        <div class="day-header">
          <span class="day-badge">DAY ${d.day}</span>
          <span class="day-date">${fmtDate(d.date)}</span>
          <span class="day-weekday">${weekday(d.date)}</span>
        </div>
        <div class="list" style="margin-bottom:20px">
      `;
      if (!dayItems.length) {
        html += `<div class="empty" style="padding:20px"><div class="empty-hint">아직 일정이 없어요</div></div>`;
      } else {
        dayItems.forEach(it => {
          html += `
            <div class="list-item">
              <div class="item-header">
                <div class="item-body">
                  ${it.time ? `<div class="schedule-time">${escapeHtml(it.time)}</div>` : ''}
                  <div class="item-title">${escapeHtml(it.title)}</div>
                  ${it.desc ? `<div class="item-desc">${escapeHtml(it.desc)}</div>` : ''}
                  <div class="item-foot">${metaLine(it)}</div>
                </div>
                ${itemActions('schedule', it.id)}
              </div>
            </div>
          `;
        });
      }
      html += `</div>`;
    });

    html += `<button class="add-btn" data-add="schedule">+ 일정 추가하기</button>`;
    container.innerHTML = html;
  }

  function openScheduleModal(existing) {
    openModal({
      title: existing ? '일정 수정' : '일정 추가',
      fields: [
        { key: 'day', label: '날짜', type: 'select', options: [
          { v: 1, l: `DAY 1 · ${fmtDate(TRIP.startDate)}` },
          { v: 2, l: `DAY 2 · ${fmtDate(TRIP.endDate)}` }
        ], value: existing?.day || 1 },
        { key: 'time', label: '시간 (선택)', type: 'time', value: existing?.time || '' },
        { key: 'title', label: '일정 제목', type: 'text', placeholder: '예: 첨성대 방문', required: true, value: existing?.title || '' },
        { key: 'desc', label: '설명 (선택)', type: 'textarea', placeholder: '메모', value: existing?.desc || '' }
      ],
      onSubmit: (vals) => {
        if (existing) {
          const it = store.data.schedule.find(i => i.id === existing.id);
          Object.assign(it, {
            day: Number(vals.day), time: vals.time, title: vals.title, desc: vals.desc,
            editedBy: store.me.name, editedAt: now()
          });
          store.log('edit', 'schedule', vals.title);
          toast('일정을 수정했어요');
        } else {
          store.data.schedule.push({
            id: uid(),
            day: Number(vals.day),
            time: vals.time,
            title: vals.title,
            desc: vals.desc,
            by: store.me.name,
            at: now()
          });
          store.log('add', 'schedule', vals.title);
          toast('일정을 추가했어요');
        }
        store.save();
      }
    });
  }

  // ------------------------------------------------
  // 6. 위시리스트 (장소)
  // ------------------------------------------------
  function renderWishlist() {
    const container = $('#screen-wishlist .list-body');
    const items = store.data.wishlist;
    if (!items.length) {
      container.innerHTML = emptyState('가고 싶은 곳을 담아보세요', '지도 링크도 함께 저장할 수 있어요') +
        `<button class="add-btn" style="margin-top:12px" data-add="wishlist">+ 장소 추가</button>`;
      return;
    }
    let html = `<div class="list">`;
    items.forEach(it => {
      html += `
        <div class="list-item">
          <div class="item-header">
            <div class="item-body">
              <div class="item-title">${escapeHtml(it.title)}</div>
              ${it.desc ? `<div class="item-desc">${escapeHtml(it.desc)}</div>` : ''}
              ${it.mapUrl ? `<a href="${escapeHtml(it.mapUrl)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:12px;font-weight:700;color:var(--sky-deep)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                지도에서 보기
              </a>` : `<button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;margin-top:8px" data-map="${escapeHtml(it.title)}">
                🗺 지도 검색
              </button>`}
              <div class="item-foot">${metaLine(it)}</div>
            </div>
            ${itemActions('wishlist', it.id)}
          </div>
        </div>
      `;
    });
    html += `</div><button class="add-btn mt-16" data-add="wishlist">+ 장소 추가</button>`;
    container.innerHTML = html;
  }

  function openWishlistModal(existing) {
    openModal({
      title: existing ? '장소 수정' : '장소 추가',
      fields: [
        { key: 'title', label: '장소명', type: 'text', placeholder: '예: 불국사', required: true, value: existing?.title || '' },
        { key: 'desc', label: '메모 (선택)', type: 'textarea', placeholder: '왜 가고 싶은지, 팁 등', value: existing?.desc || '' },
        { key: 'mapUrl', label: '지도 링크 (선택)', type: 'text', placeholder: 'https://map.naver.com/...', value: existing?.mapUrl || '' }
      ],
      onSubmit: (vals) => {
        if (existing) {
          const it = store.data.wishlist.find(i => i.id === existing.id);
          Object.assign(it, { title: vals.title, desc: vals.desc, mapUrl: vals.mapUrl, editedBy: store.me.name, editedAt: now() });
          store.log('edit', 'wishlist', vals.title);
          toast('장소를 수정했어요');
        } else {
          store.data.wishlist.push({
            id: uid(), title: vals.title, desc: vals.desc, mapUrl: vals.mapUrl,
            by: store.me.name, at: now()
          });
          store.log('add', 'wishlist', vals.title);
          toast('장소를 추가했어요');
        }
        store.save();
      }
    });
  }

  // ------------------------------------------------
  // 7. 먹고 싶은 음식
  // ------------------------------------------------
  function renderFoods() {
    const container = $('#screen-foods .list-body');
    const items = store.data.foods;
    if (!items.length) {

  // ------------------------------------------------
  // 14. 모달 (동적 폼)
  // ------------------------------------------------
  function openModal({ title, fields, onSubmit, submitLabel }) {
    const overlay = $('#modalOverlay');
    const body = $('#modalBody');
    const fieldsHtml = fields.map(f => {
      if (f.type === 'select') {
        return `
          <div class="field">
            <label>${escapeHtml(f.label)}</label>
            <select data-k="${f.key}">
              ${f.options.map(o => `<option value="${escapeHtml(o.v)}" ${String(o.v) === String(f.value) ? 'selected' : ''}>${escapeHtml(o.l)}</option>`).join('')}
            </select>
          </div>`;
      }
      if (f.type === 'textarea') {
        return `
          <div class="field">
            <label>${escapeHtml(f.label)}</label>
            <textarea data-k="${f.key}" ${f.rows ? `rows="${f.rows}"` : ''} placeholder="${escapeHtml(f.placeholder || '')}">${escapeHtml(f.value || '')}</textarea>
          </div>`;
      }
      return `
        <div class="field">
          <label>${escapeHtml(f.label)}</label>
          <input data-k="${f.key}" type="${f.type}" placeholder="${escapeHtml(f.placeholder || '')}" value="${escapeHtml(f.value || '')}" />
        </div>`;
    }).join('');

    body.innerHTML = `
      <div class="modal-handle"></div>
      <div class="modal-title">${escapeHtml(title)}</div>
      ${fieldsHtml}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">취소</button>
        <button class="btn btn-primary" id="modalSubmit">${escapeHtml(submitLabel || '저장')}</button>
      </div>
    `;

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    $('#modalCancel').addEventListener('click', closeModal);
    $('#modalSubmit').addEventListener('click', () => {
      const vals = {};
      let hasError = false;
      fields.forEach(f => {
        const el = body.querySelector(`[data-k="${f.key}"]`);
        vals[f.key] = el ? el.value.trim() : '';
        if (f.required && !vals[f.key]) {
          el.style.borderColor = 'var(--critical)';
          hasError = true;
        }
      });
      if (hasError) { toast('필수 항목을 입력해주세요'); return; }
      onSubmit(vals);
      closeModal();
    });
  }

  function closeModal() {
    $('#modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  // ------------------------------------------------
  // 15. 이벤트 위임
  // ------------------------------------------------
  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-tab]');
    if (t) {
      navigate(t.dataset.tab);
      return;
    }

    const back = e.target.closest('#headerBack');
    if (back) { navigate('home'); return; }

    const menu = e.target.closest('.menu-card[data-route]');
    if (menu) { navigate(menu.dataset.route); return; }

    const add = e.target.closest('[data-add]');
    if (add) {
      const s = add.dataset.add;
      if (s === 'schedule') openScheduleModal();
      else if (s === 'wishlist') openWishlistModal();
      else if (s === 'foods') openFoodsModal();
      else if (s === 'checklist') openChecklistModal();
      else if (s === 'budget') openBudgetModal();
      return;
    }

    const editInfo = e.target.closest('[data-edit-info]');
    if (editInfo) { openInfoModal(editInfo.dataset.editInfo); return; }

    const check = e.target.closest('[data-check]');
    if (check) { toggleCheck(check.dataset.check); return; }

    const map = e.target.closest('[data-map]');
    if (map) {
      const q = encodeURIComponent(map.dataset.map + ' 경주');
      window.open(`https://map.naver.com/p/search/${q}`, '_blank', 'noopener');
      return;
    }

    const act = e.target.closest('[data-act]');
    if (act) {
      const { act: type, section, id } = act.dataset;
      handleItemAction(type, section, id);
      return;
    }

    const settingsAction = e.target.closest('[data-action]');
    if (settingsAction) {
      handleSettingsAction(settingsAction.dataset.action);
      return;
    }

    // modal backdrop click to close
    if (e.target.id === 'modalOverlay') closeModal();
  });

  function handleItemAction(type, section, id) {
    if (type === 'edit') {
      const item = (store.data[section] || []).find(i => i.id === id);
      if (!item) return;
      if (section === 'schedule') openScheduleModal(item);
      else if (section === 'wishlist') openWishlistModal(item);
      else if (section === 'foods') openFoodsModal(item);
      else if (section === 'checklist') openChecklistModal(item);
      else if (section === 'budget') openBudgetModal(item);
    } else if (type === 'delete') {
      const arr = store.data[section];
      if (!arr) return;
      const idx = arr.findIndex(i => i.id === id);
      if (idx < 0) return;
      const item = arr[idx];
      if (!confirm(`"${item.title || item.body || '항목'}"을(를) 삭제할까요?`)) return;
      arr.splice(idx, 1);
      store.log('remove', section, item.title || (item.body ? item.body.slice(0, 20) : '항목'));
      store.save();
      toast('삭제했어요');
    }
  }

  function handleSettingsAction(action) {
    if (action === 'change-nick') {
      showOnboarding(true);
    } else if (action === 'logout') {
      if (!confirm('닉네임을 다시 등록하시겠어요?')) return;
      localStorage.removeItem(LS_ME);
      store.me = null;
      renderRoute();
    } else if (action === 'export') {
      const blob = new Blob([JSON.stringify(store.data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gyeongju-trip-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('내보냈어요');
    }
  }

  // ------------------------------------------------
  // 16. 온보딩 (닉네임 등록)
  // ------------------------------------------------
  function showOnboarding(isChange = false) {
    const wrap = $('#onboarding');
    const shell = $('#appShell');
    wrap.classList.remove('hidden');
    shell.classList.add('hidden');

    const chipsHtml = TRIP.members.map(n => `
      <button class="nick-chip" data-nick="${escapeHtml(n)}">${escapeHtml(n)}</button>
    `).join('');

    wrap.innerHTML = `
      <div class="onboard-wrap">
        <div class="onboard-card">
          <div class="onboard-illust">🌴</div>
          <div class="onboard-title">${isChange ? '닉네임 변경' : '누구세요?'}</div>
          <div class="onboard-sub">
            경주 여행 계획에 함께해요.<br>
            닉네임으로 수정 이력이 표시돼요.
          </div>
          <div class="nickname-suggests">
            ${chipsHtml}
          </div>
          <div class="field">
            <input id="nickInput" type="text" placeholder="직접 입력" value="${isChange && store.me ? escapeHtml(store.me.name) : ''}" maxlength="10" />
          </div>
          <button class="btn btn-primary btn-block" id="nickSubmit">시작하기</button>
          <div style="margin-top:16px;font-size:11px;color:var(--stone)">
            저장 모드: ${store.mode === 'firebase' ? '🟢 실시간 공유' : '🟡 로컬 저장'}
          </div>
        </div>
      </div>
    `;

    $$('.nick-chip', wrap).forEach(chip => {
      chip.addEventListener('click', () => {
        $$('.nick-chip', wrap).forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        $('#nickInput').value = chip.dataset.nick;
      });
    });

    $('#nickSubmit').addEventListener('click', () => {
      const name = $('#nickInput').value.trim();
      if (!name) { toast('닉네임을 입력해주세요'); return; }
      if (name.length > 10) { toast('10자 이내로 입력해주세요'); return; }
      store.setMe(name);
      if (isChange) {
        // 로그 남기기
      }
      navigate('home');
      renderRoute();
      toast(`${name}님 반가워요!`);
    });

    $('#nickInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#nickSubmit').click();
    });
  }

  // ------------------------------------------------
  // 17. 초기화
  // ------------------------------------------------
  window.addEventListener('hashchange', renderRoute);

  store.onChange(() => {
    // 데이터 변경 시 현재 화면 다시 그리기
    renderRoute();
  });

  store.init().then(() => {
    if (!store.me) {
      showOnboarding();
    } else {
      renderRoute();
      // 홈이 아니어도 상관없이 그리기
    }
    // D-day 매초 재계산은 불필요, 렌더 시에만
    fetchWeather();
  });

})();

  </script>
</body>
</html>
