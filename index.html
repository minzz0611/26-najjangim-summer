  <style>
/* ================================
   경주 여행 - 여름 바캉스 스타일
   ================================ */

:root {
  /* Brand */
  --sky: #38BDF8;
  --sky-deep: #0284C7;
  --sky-soft: #E0F2FE;
  --coral: #FF7A6B;
  --coral-deep: #E85A4B;
  --coral-soft: #FFE4E0;
  --sun: #FFD84D;
  --sun-soft: #FFF4C7;
  --sand: #FFF7ED;
  --mint: #6EE7B7;
  --lavender: #C4B5FD;

  /* Neutrals */
  --canvas: #FFFFFF;
  --surface-soft: #F8FAFC;
  --hairline: #E2E8F0;
  --hairline-soft: #F1F5F9;
  --ink-deep: #0F172A;
  --ink: #1E293B;
  --charcoal: #334155;
  --slate: #475569;
  --steel: #64748B;
  --stone: #94A3B8;

  /* Semantic */
  --success: #10B981;
  --warning: #F59E0B;
  --critical: #EF4444;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --r-xxl: 28px;
  --r-full: 999px;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
  --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
  --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.12);

  /* Layout */
  --app-max: 480px;
  --tabbar-h: 72px;
  --header-h: 64px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  color: var(--ink-deep);
  background: linear-gradient(180deg, #E0F2FE 0%, #FEF3C7 50%, #FFF7ED 100%);
  background-attachment: fixed;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--sky-deep);
  text-decoration: none;
}

/* ================================
   App Shell
   ================================ */
.app {
  max-width: var(--app-max);
  margin: 0 auto;
  min-height: 100vh;
  background: var(--canvas);
  position: relative;
  padding-bottom: calc(var(--tabbar-h) + 20px);
  box-shadow: 0 0 40px rgba(15, 23, 42, 0.06);
}
.app.has-subtabs {
  padding-bottom: calc(var(--tabbar-h) + 20px + 62px);
}

/* ================================
   Header
   ================================ */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  height: calc(var(--header-h) + env(safe-area-inset-top));
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--hairline-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: env(safe-area-inset-top) 16px 0;
}

.header-back {
  width: 40px;
  height: 40px;
  border-radius: var(--r-full);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
}
.header-back:active { background: var(--surface-soft); }

.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.2px;
}

.header-me {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  background: var(--sky-soft);
  color: var(--sky-deep);
  font-size: 12px;
  font-weight: 700;
  border: 1.5px solid transparent;
}
.header-me .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ================================
   Screens
   ================================ */
.screen {
  display: none;
  padding: 16px;
  animation: fadeIn 0.25s ease-out;
}
.screen.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================================
   HOME - Hero Card
   ================================ */
.hero-card {
  position: relative;
  border-radius: var(--r-xxl);
  padding: 16px 20px;
  background: linear-gradient(135deg, #38BDF8 0%, #7DD3FC 50%, #FFD84D 100%);
  color: white;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.18);
}
.hero-card::after {
  content: '';
  position: absolute;
  bottom: -30px;
  left: -30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(255, 122, 107, 0.35);
}

.hero-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.hero-title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-top: 4px;
  position: relative;
  z-index: 1;
  line-height: 1.2;
  white-space: nowrap;
}

.hero-sub {
  margin-top: 8px;
  font-size: 14px;
  opacity: 0.95;
  position: relative;
  z-index: 1;
}

.dday-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  z-index: 1;
}
.dday-num {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1;
}
.dday-label {
  font-size: 20px;
  font-weight: 800;
  opacity: 0.95;
}

/* ================================
   Members row
   ================================ */
.members-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding: 4px 0;
}
.member-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px 8px 6px;
  background: white;
  border: 1px solid var(--hairline);
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}
.member-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

/* ================================
   Section Grid (Home menu)
   ================================ */
.section-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin: 20px 0 12px;
  color: var(--ink-deep);
}
.section-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin: 20px 0 12px;
}
.section-title-row .section-title { margin: 0; }
.section-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--steel);
}

.menu-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.menu-card {
  position: relative;
  background: white;
  border-radius: var(--r-xl);
  padding: 18px 16px 16px;
  text-align: left;
  border: 1px solid var(--hairline-soft);
  transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
  overflow: hidden;
}
.menu-card:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-sm);
}
.menu-card .icon-blob {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 10px;
}
.menu-card .title {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink-deep);
  letter-spacing: -0.2px;
}
.menu-card .meta {
  font-size: 11px;
  color: var(--steel);
  margin-top: 3px;
  font-weight: 500;
}

/* icon variants */
.icon-blob.b-sky { background: var(--sky-soft); color: var(--sky-deep); }
.icon-blob.b-coral { background: var(--coral-soft); color: var(--coral-deep); }
.icon-blob.b-sun { background: var(--sun-soft); color: #B45309; }
.icon-blob.b-mint { background: #D1FAE5; color: #047857; }
.icon-blob.b-lavender { background: #EDE9FE; color: #6D28D9; }
.icon-blob.b-sand { background: var(--sand); color: #92400E; }
.icon-blob.b-rose { background: #FFE4E6; color: #BE123C; }
.icon-blob.b-slate { background: var(--surface-soft); color: var(--charcoal); }

/* ================================
   Tab Bar
   ================================ */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--app-max);
  height: var(--tabbar-h);
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--hairline-soft);
  display: flex;
  align-items: stretch;
  z-index: 40;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  color: var(--stone);
  font-size: 11px;
  font-weight: 600;
  transition: color 0.15s;
}
.tab-btn svg { width: 22px; height: 22px; }
.tab-btn.active {
  color: var(--sky-deep);
}

/* ================================
   Sub Tabs (일정표 / 하고싶은것 등, 하단 슬라이더형 토글)
   ================================ */
.sub-tabs {
  position: fixed;
  left: 50%;
  bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--app-max);
  z-index: 39;
  padding: 10px 16px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--hairline-soft);
}
.sub-tabs.hidden { display: none; }
.sub-tabs-track {
  position: relative;
  display: flex;
  background: var(--surface-soft);
  border-radius: var(--r-full);
  padding: 4px;
  touch-action: pan-y;
  user-select: none;
}
.sub-tabs-thumb {
  position: absolute;
  top: 4px;
  left: 4px;
  bottom: 4px;
  width: calc((100% - 8px) / 5);
  background: var(--sky-deep);
  border-radius: var(--r-full);
  box-shadow: var(--shadow-sm);
  transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.4, 1);
  z-index: 0;
}
.sub-tab-btn {
  position: relative;
  z-index: 1;
  flex: 1;
  padding: 9px 2px;
  border-radius: var(--r-full);
  color: var(--slate);
  font-size: 11.5px;
  font-weight: 700;
  white-space: nowrap;
  text-align: center;
  transition: color 0.2s;
}
.sub-tab-btn.active { color: white; }

/* ================================
   List Items (일정, 위시, 음식 etc)
   ================================ */
.list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.list-item {
  background: white;
  border: 1px solid var(--hairline-soft);
  border-radius: var(--r-lg);
  padding: 14px 14px 12px;
  position: relative;
  transition: border-color 0.15s;
}
.list-item .item-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.list-item .item-body {
  flex: 1;
  min-width: 0;
}
.list-item .item-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink-deep);
  letter-spacing: -0.2px;
  word-break: break-word;
}
.list-item .item-desc {
  font-size: 13px;
  color: var(--charcoal);
  margin-top: 4px;
  word-break: break-word;
  white-space: pre-wrap;
  line-height: 1.55;
}
#screen-checklist .item-title {
  font-size: 13px;
}
.list-item .item-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  font-size: 11px;
  color: var(--steel);
  flex-wrap: wrap;
}
.item-foot .by {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px 3px 3px;
  background: var(--surface-soft);
  border-radius: var(--r-full);
  font-weight: 600;
  color: var(--charcoal);
}
.item-foot .by .mini-avatar {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  color: white;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.item-foot .dot-sep { color: var(--stone); }
.item-foot .map-link {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: var(--sky-deep);
}

.item-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--steel);
}
.icon-btn:active { background: var(--surface-soft); }
.icon-btn.danger { color: var(--critical); }
.icon-btn svg { width: 16px; height: 16px; }

/* Checkbox row (준비물) */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
}
.check-box {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: white;
  color: white;
  transition: all 0.15s;
}
.check-box.checked {
  background: var(--sky);
  border-color: var(--sky);
}
.check-box.checked::after {
  content: '';
  width: 10px;
  height: 6px;
  border-left: 2px solid white;
  border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px);
}
.check-item.checked .item-title {
  text-decoration: line-through;
  color: var(--stone);
}

/* Day header (일정표) */
.day-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 8px 0 10px;
  padding-top: 4px;
}
.day-badge {
  padding: 4px 12px;
  background: var(--sky);
  color: white;
  font-size: 12px;
  font-weight: 800;
  border-radius: var(--r-full);
  letter-spacing: 0.5px;
}
.day-date {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
}
.day-weekday {
  font-size: 13px;
  color: var(--steel);
  font-weight: 500;
}

.schedule-time {
  display: inline-block;
  padding: 3px 10px;
  background: var(--sun-soft);
  color: #B45309;
  font-size: 11px;
  font-weight: 700;
  border-radius: var(--r-full);
  letter-spacing: 0.3px;
  margin-bottom: 6px;
}

/* Add button (FAB style at bottom of list) */
.add-btn {
  width: 100%;
  padding: 14px;
  background: white;
  border: 2px dashed var(--hairline);
  border-radius: var(--r-lg);
  color: var(--steel);
  font-size: 14px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s;
}
.add-btn:active {
  border-color: var(--sky);
  color: var(--sky-deep);
  background: var(--sky-soft);
}

/* ================================
   Buttons
   ================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 22px;
  border-radius: var(--r-full);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.1px;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--sky);
  color: white;
}
.btn-primary:active { background: var(--sky-deep); }
.btn-coral {
  background: var(--coral);
  color: white;
}
.btn-coral:active { background: var(--coral-deep); }
.btn-ink {
  background: var(--ink-deep);
  color: white;
}
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--hairline);
}
.btn-block { width: 100%; }
.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* ================================
   Modals
   ================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.active {
  display: flex;
  animation: fadeIn 0.2s ease-out;
}
.modal {
  width: 100%;
  max-width: var(--app-max);
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--hairline);
  border-radius: 4px;
  margin: 0 auto 16px;
}
.modal-title {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin-bottom: 16px;
}
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}
.modal-actions .btn { flex: 1; }

/* Form fields */
.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--charcoal);
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}
.field input, .field textarea, .field select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--hairline);
  border-radius: var(--r-md);
  background: white;
  font-size: 15px;
  transition: border-color 0.15s;
  color: var(--ink-deep);
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none;
  border-color: var(--sky);
}
.field textarea {
  resize: vertical;
  min-height: 90px;
  font-family: inherit;
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* Nickname picker */
.nickname-suggests {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.nick-chip {
  padding: 10px 18px;
  border-radius: var(--r-full);
  background: white;
  border: 1.5px solid var(--hairline);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  transition: all 0.15s;
}
.nick-chip:active, .nick-chip.selected {
  background: var(--sky);
  border-color: var(--sky);
  color: white;
}

/* ================================
   Nickname Onboarding Screen
   ================================ */
.onboard-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.onboard-card {
  width: 100%;
  max-width: 420px;
  background: white;
  border-radius: var(--r-xxl);
  padding: 32px 24px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.onboard-illust {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--sky) 0%, var(--sun) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  box-shadow: 0 8px 20px rgba(56, 189, 248, 0.35);
}
.onboard-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.onboard-sub {
  font-size: 14px;
  color: var(--steel);
  margin-bottom: 24px;
  line-height: 1.55;
}

/* ================================
   Empty state
   ================================ */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--stone);
}
.empty-icon {
  font-size: 42px;
  margin-bottom: 10px;
  opacity: 0.6;
}
.empty-text {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--steel);
}
.empty-hint {
  font-size: 12px;
  color: var(--stone);
}

/* ================================
   Activity Timeline
   ================================ */
.timeline {
  position: relative;
  padding-left: 22px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--hairline);
}
.tl-item {
  position: relative;
  padding: 6px 0 14px 8px;
}
.tl-item::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 10px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--sky);
  border: 2px solid white;
  box-shadow: 0 0 0 1.5px var(--sky);
}
.tl-item.add::before { background: var(--success); box-shadow: 0 0 0 1.5px var(--success); }
.tl-item.edit::before { background: var(--warning); box-shadow: 0 0 0 1.5px var(--warning); }
.tl-item.remove::before { background: var(--critical); box-shadow: 0 0 0 1.5px var(--critical); }
.tl-item.comment::before { background: var(--lavender); box-shadow: 0 0 0 1.5px var(--lavender); }
.tl-time {
  font-size: 11px;
  color: var(--steel);
  font-weight: 600;
  margin-bottom: 3px;
}
.tl-text {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.55;
}
.tl-text b {
  font-weight: 700;
  color: var(--ink-deep);
}
.tl-text .tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 700;
  color: var(--charcoal);
  background: var(--surface-soft);
  margin: 0 2px;
}

/* ================================
   Budget
   ================================ */
.budget-summary {
  background: linear-gradient(135deg, var(--coral) 0%, var(--sun) 100%);
  border-radius: var(--r-xl);
  padding: 20px;
  color: white;
  margin-bottom: 16px;
}
.budget-total {
  font-size: 12px;
  font-weight: 700;
  opacity: 0.95;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.budget-amount {
  font-size: 30px;
  font-weight: 800;
  margin-top: 4px;
  letter-spacing: -0.6px;
}
.budget-split {
  display: flex;
  gap: 12px;
  margin-top: 14px;
  padding-top: 14px;

  function colorFor(name) {
    if (MEMBER_COLORS[name]) return MEMBER_COLORS[name];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;

  function fmtDateTime(t) {

    { id: uid(), type: 'place', title: '동궁과 월지', desc: '야간 조명 필수 코스', mapUrl: '', by: '나원', at: now() },
    { id: uid(), type: 'food', title: '황남빵', desc: '경주 대표 기념품용 간식', by: '희주', at: now() },
    { id: uid(), type: 'food', title: '교리김밥', desc: '황리단길 유명 김밥집', by: '나원', at: now() },
    { id: uid(), type: 'food', title: '황리단길 라면집', desc: '분위기 좋은 감성 라면', by: '민주', at: now() }
  ]);

  const demoChecklist = () => ([
    { id: uid(), title: '자외선 차단제', checked: true, by: '민주', at: now(), checkedBy: '민주', checkedAt: now() },
    { id: uid(), title: '카메라 / 보조배터리', checked: false, by: '희주', at: now() },
    { id: uid(), title: '편한 신발', checked: false, by: '나원', at: now() },
    { id: uid(), title: '자동차 충전케이블', checked: false, by: '민주', at: now() }
  ]);

  const demoBudget = () => ([
    { id: uid(), title: '숙소 1박', amount: 150000, category: '숙소', by: '민주', at: now() },
    { id: uid(), title: '왕복 KTX', amount: 120000, category: '교통', by: '희주', at: now() },
    { id: uid(), title: '불국사 입장료', amount: 6000, category: '입장료', by: '나원', at: now() },
    { id: uid(), title: '황리단길 식사', amount: 60000, category: '식비', by: '민주', at: now() }
  ]);

  const demoMemos = () => ([
    { id: uid(), name: '나원', body: '다들 편한 신발 꼭 챙겨오기!', at: now() },
    { id: uid(), name: '희주', body: '숙소 체크인 시간 15시 맞춰서 움직이자~', at: now() }
  ]);

  const emptyData = () => ({
    schedule: demoSchedule(),   // {id, day, time, title, desc, by, at, editedBy, editedAt}
    wishes: demoWishes(),   // {id, type: 'place'|'food', title, desc, mapUrl, by, at, ...}
    checklist: demoChecklist(),  // {id, title, checked, by, at, checkedBy, checkedAt}
    budget: demoBudget(),     // {id, title, amount, category, by, at}
    memos: demoMemos(),      // 자유 게시판 글: {id, name, body, at}
    activity: [],    // 이력 로그
    roster: {}       // 자리(slot) -> 현재 닉네임. 예: { "나원": "제이" }
  });

  const store = {
    mode: 'local',   // 'firebase' | 'local'
    data: emptyData(),
    me: null,
    listeners: [],
    fbRef: null,
    _skipNextRemote: false,

    onChange(fn) { this.listeners.push(fn); },
    emit() { this.listeners.forEach(fn => fn(this.data)); },

    loadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) this.data = Object.assign(emptyData(), JSON.parse(raw));
      } catch (e) {}
    },

    async init() {
      // load me
      try { this.me = JSON.parse(localStorage.getItem(LS_ME) || 'null'); } catch (e) { this.me = null; }

      // try firebase
      const hasFb = CFG.apiKey && CFG.databaseURL && window.firebase;
      if (hasFb) {
        try {
          if (!firebase.apps.length) firebase.initializeApp(CFG);
          this.fbRef = firebase.database().ref(`rooms/${ROOM}`);
          this.mode = 'firebase';
          // realtime listener
          this.fbRef.on('value', (snap) => {
            const val = snap.val();
            if (val) {
              this.data = Object.assign(emptyData(), val);
              // ensure arrays
              ['schedule', 'wishes', 'checklist', 'budget', 'memos', 'activity'].forEach(k => {
                if (!Array.isArray(this.data[k])) this.data[k] = [];
              });
              if (!this.data.roster || typeof this.data.roster !== 'object') this.data.roster = {};
            } else {
              this.data = emptyData();
            }
            this.emit();
            updateSyncPill('online');
          }, (err) => {
            console.error('[Firebase 읽기 실패 — 규칙(Rules)을 확인하세요]', err);
            this.mode = 'local';
            this.loadFromLocalStorage();
            updateSyncPill('local');
            toast('⚠️ 실시간 연결 실패 — 로컬 저장 모드로 전환됨 (Firebase 규칙 확인 필요)');
            this.emit();
          });
          return;
        } catch (e) {
          console.error('[Firebase 초기화 실패]', e);
          this.mode = 'local';
        }
      }

      // localStorage load
      this.loadFromLocalStorage();
      updateSyncPill('local');
      // emit next tick so listeners bind first
      setTimeout(() => this.emit(), 0);
    },

    async save() {
      // 항상 로컬에도 백업 저장 (Firebase 실패해도 기기 안에서는 유지되도록)
      try { localStorage.setItem(LS_KEY, JSON.stringify(this.data)); } catch (e) {}

      // 성공 여부와 상관없이 화면은 즉시 갱신 (낙관적 업데이트)
      // — 이게 안 되어 있으면 Firebase 쓰기가 실패했을 때 삭제/추가/수정이
      //   로컬 데이터엔 반영돼도 화면엔 전혀 반영되지 않는 문제가 생김
      this.emit();

      if (this.mode === 'firebase' && this.fbRef) {
        try {
          await this.fbRef.set(this.data);
        } catch (e) {
          console.error('[Firebase 저장 실패]', e);
          toast('⚠️ 실시간 저장 실패 — Firebase 규칙/네트워크를 확인해주세요 (로컬엔 저장됨)');
        }
      }
    },

    setMe(name, slot) {
      // slot: 이 사람이 원래 선택했던 프리셋 자리(민주/희주/나원 등). 닉네임을 바꿔도 자리는 유지.
      const finalSlot = slot || (this.me && this.me.slot) || (TRIP.members.includes(name) ? name : name);
      this.me = { name, slot: finalSlot, joinedAt: (this.me && this.me.joinedAt) || now() };
      try { localStorage.setItem(LS_ME, JSON.stringify(this.me)); } catch (e) {}

      // 홈 화면 멤버 목록에도 바뀐 닉네임이 보이도록 roster 동기화 (다른 기기에도 공유됨)
      if (!this.data.roster) this.data.roster = {};
      this.data.roster[finalSlot] = name;
      this.save();
    },

    // 활동 로그 추가 (최근 100개)
    log(type, section, title, itemId) {
      const item = {
        id: uid(),
        type,       // 'add' | 'edit' | 'remove' | 'check' | 'uncheck' | 'comment'
        section,    // 'schedule' | 'wishes' | ...
        title: title || '',
        itemId: itemId || '',
        by: this.me ? this.me.name : '알수없음',
        at: now()
      };
      this.data.activity = [item, ...(this.data.activity || [])].slice(0, 100);
    }
  };

  function updateSyncPill(state) {
    const p = $('#syncPill');
    if (!p) return;
    p.classList.remove('online', 'local');
    if (state === 'online') {
      p.classList.add('online');
      p.querySelector('.sync-text').textContent = '실시간 동기화 중';
    } else {
      p.classList.add('local');
      p.querySelector('.sync-text').textContent = '로컬 저장 모드';
    }
  }

  // ------------------------------------------------
  // 2. 라우터 (해시 기반)
  // ------------------------------------------------
  const SECTIONS = {
    home: '홈',
    schedule: '일정표',
    wishes: '하고 싶은 것',
    checklist: '준비물',
    budget: '예산 · 비용 분담',
    memos: '자유 게시판',
    activity: '수정 이력',
    settings: '설정'
  };

  const CONTENT_TABS = ['schedule', 'wishes', 'checklist', 'budget', 'memos'];

  function navigate(name) {
    if (!SECTIONS[name]) name = 'home';
    location.hash = '#' + name;
  }
  function currentRoute() {
    const h = (location.hash || '').replace('#', '');
    return SECTIONS[h] ? h : 'home';
  }

  function renderRoute() {
    if (!store.me) {
      $('#onboarding').classList.remove('hidden');
      $('#appShell').classList.add('hidden');
      return;
    }
    $('#onboarding').classList.add('hidden');
    $('#appShell').classList.remove('hidden');

    const route = currentRoute();
    $$('.screen').forEach(s => s.classList.remove('active'));
    const target = $(`#screen-${route}`);
    if (target) target.classList.add('active');

    // Header
    const isHome = route === 'home';
    $('#headerBack').classList.toggle('hidden', isHome);
    $('#headerTitle').textContent = isHome ? '경주 여행' : SECTIONS[route];
    $('#headerMe').classList.toggle('hidden', !isHome);

    // 서브 탭 (일정표/하고싶은것/준비물/예산/게시판 전환용, 하단 슬라이더형)
    const isContentTab = CONTENT_TABS.includes(route);
    $('#subTabs').classList.toggle('hidden', !isContentTab);
    $('#appShell').classList.toggle('has-subtabs', isContentTab);
    $$('.sub-tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.subtab === route);
    });
    updateSubTabsThumb(route);

    // Tabs
    $$('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === route ||
        (route !== 'activity' && route !== 'settings' && b.dataset.tab === 'home'));
    });

    // Render each screen
    if (route === 'home') renderHome();
    else if (route === 'schedule') renderSchedule();
    else if (route === 'wishes') renderWishes();
    else if (route === 'checklist') renderChecklist();
    else if (route === 'budget') renderBudget();
    else if (route === 'memos') renderMemos();
    else if (route === 'activity') renderActivity();
    else if (route === 'settings') renderSettings();

    window.scrollTo(0, 0);
  }

  // ------------------------------------------------
  // 3. 홈
  // ------------------------------------------------
  function calcDday() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const start = new Date(TRIP.startDate); start.setHours(0, 0, 0, 0);
    const diff = Math.round((start - today) / 86400000);
    if (diff > 0) return { label: 'D -', num: diff };
    if (diff === 0) return { label: 'D', num: 'DAY' };
    return { label: 'D +', num: Math.abs(diff) };
  }

  function renderHome() {
    const dd = calcDday();
    $('#ddayNum').textContent = dd.num;
    $('#ddayLabel').textContent = dd.label + (typeof dd.num === 'number' ? '' : '');
    if (typeof dd.num !== 'number') {
      $('#ddayNum').style.fontSize = '38px';
    }

    const start = new Date(TRIP.startDate);
    const end = new Date(TRIP.endDate);
    $('#tripDates').textContent =
      `${start.getFullYear()}. ${start.getMonth() + 1}. ${start.getDate()} ~ ${end.getMonth() + 1}. ${end.getDate()} · ${weekday(TRIP.startDate).slice(0, 1)}·${weekday(TRIP.endDate).slice(0, 1)}`;

    // members
    const roster = store.data.roster || {};
    const mr = $('#membersRow');
    mr.innerHTML = TRIP.members.map(n => {
      const displayName = roster[n] || n;
      return `
        <div class="member-chip">
          <div class="member-avatar" style="background:${colorFor(n)}">${escapeHtml(initial(displayName))}</div>
          <span>${escapeHtml(displayName)}</span>
        </div>
      `;
    }).join('');

    // header me
    const me = store.me.name;
    $('#headerMe').innerHTML = `<span class="dot" style="background:${colorFor(me)}"></span><span>${escapeHtml(me)}</span>`;
    $('#headerMe').style.background = colorFor(me) + '22';
    $('#headerMe').style.color = colorFor(me);

    // counts
    const d = store.data;
    $('#cnt-schedule').textContent = d.schedule.length ? `${d.schedule.length}건` : '비어 있음';
    $('#cnt-wishes').textContent = d.wishes.length ? `${d.wishes.length}개` : '비어 있음';
    const done = d.checklist.filter(i => i.checked).length;
    $('#cnt-checklist').textContent = d.checklist.length ? `${done}/${d.checklist.length}` : '비어 있음';
    const total = d.budget.reduce((s, b) => s + (Number(b.amount) || 0), 0);
    $('#cnt-budget').textContent = total ? `${total.toLocaleString()}원` : '비어 있음';
    $('#cnt-memos').textContent = d.memos.length ? `${d.memos.length}개` : '비어 있음';
  }


  // ------------------------------------------------
  // 4. 공통 CRUD 렌더 헬퍼
  // ------------------------------------------------
  function metaLine(item, opts = {}) {
    const by = item.by || '?';
    const at = item.at ? fmtDateTime(item.at) : '';
    const edited = item.editedBy && item.editedBy !== item.by;
    const editedAt = item.editedAt ? fmtDateTime(item.editedAt) : '';
    let html = '';
    if (!opts.hideAuthor) {
      html += `
        <span class="by">
          <span class="mini-avatar" style="background:${colorFor(by)}">${escapeHtml(initial(by))}</span>
          ${escapeHtml(by)}
        </span>
        <span class="dot-sep">·</span>
      `;
    }
    html += `<span>${at}</span>`;
    if (edited || (item.editedAt && item.editedAt !== item.at)) {
      html += `<span class="dot-sep">·</span><span style="color:var(--warning);font-weight:600">${opts.hideAuthor ? '' : escapeHtml(item.editedBy || by) + ' '}수정 ${editedAt}</span>`;
    }
    return html;
  }

  function itemActions(section, id) {
    return `
      <div class="item-actions">
        <button class="icon-btn" data-act="edit" data-section="${section}" data-id="${id}" aria-label="수정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" data-act="delete" data-section="${section}" data-id="${id}" aria-label="삭제">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </div>
    `;
  }

  function emptyState(text, hint) {
    return `
      <div class="empty">
        <div class="empty-icon">🏖️</div>
        <div class="empty-text">${escapeHtml(text)}</div>
        <div class="empty-hint">${escapeHtml(hint || '')}</div>
      </div>
    `;
  }

  // ------------------------------------------------
  // 5. 일정표
  // ------------------------------------------------
  function renderSchedule() {
    const container = $('#screen-schedule .list-body');
    const items = store.data.schedule.slice().sort((a, b) => {
      if (a.day !== b.day) return a.day - b.day;
      return (a.time || '').localeCompare(b.time || '');
    });

    const days = [
      { day: 1, date: TRIP.startDate },
      { day: 2, date: TRIP.endDate }
    ];

    let html = '';
    days.forEach(d => {
      const dayItems = items.filter(i => i.day === d.day);
      html += `
        <div class="day-header">
          <span class="day-badge">DAY ${d.day}</span>
          <span class="day-date">${fmtDate(d.date)}</span>
          <span class="day-weekday">${weekday(d.date)}</span>
        </div>
        <div class="list" style="margin-bottom:20px">
      `;
      if (!dayItems.length) {
        html += `<div class="empty" style="padding:20px"><div class="empty-hint">아직 일정이 없어요</div></div>`;
      } else {
        dayItems.forEach(it => {
          html += `
            <div class="list-item" id="item-${it.id}">
              <div class="item-header">
                <div class="item-body">
                  ${it.time ? `<div class="schedule-time">${escapeHtml(it.time)}</div>` : ''}
                  <div class="item-title">${escapeHtml(it.title)}</div>
                  ${it.desc ? `<div class="item-desc">${escapeHtml(it.desc)}</div>` : ''}
                  <div class="item-foot">${metaLine(it, { hideAuthor: true })}</div>
                </div>
                ${itemActions('schedule', it.id)}
              </div>
            </div>
          `;
        });
      }
      html += `</div>`;
    });

    html += `<button class="add-btn" data-add="schedule">+ 일정 추가하기</button>`;
    container.innerHTML = html;
  }

  function openScheduleModal(existing) {
    openModal({
      title: existing ? '일정 수정' : '일정 추가',
      fields: [
        { key: 'day', label: '날짜', type: 'select', options: [
          { v: 1, l: `DAY 1 · ${fmtDate(TRIP.startDate)}` },
          { v: 2, l: `DAY 2 · ${fmtDate(TRIP.endDate)}` }
        ], value: existing?.day || 1 },
        { key: 'time', label: '시간 (선택)', type: 'time', value: existing?.time || '' },
        { key: 'title', label: '일정 제목', type: 'text', placeholder: '예: 첨성대 방문', required: true, value: existing?.title || '' },
        { key: 'desc', label: '설명 (선택)', type: 'textarea', placeholder: '메모', value: existing?.desc || '' }
      ],
      onSubmit: (vals) => {
        if (existing) {
          const it = store.data.schedule.find(i => i.id === existing.id);
          Object.assign(it, {
            day: Number(vals.day), time: vals.time, title: vals.title, desc: vals.desc,
            editedBy: store.me.name, editedAt: now()
          });
          store.log('edit', 'schedule', vals.title, it.id);
          toast('일정을 수정했어요');
        } else {
          const newId = uid();
          store.data.schedule.push({
            id: newId,
            day: Number(vals.day),
            time: vals.time,
            title: vals.title,
            desc: vals.desc,
            by: store.me.name,
            at: now()
          });
          store.log('add', 'schedule', vals.title, newId);
          toast('일정을 추가했어요');
        }
        store.save();
      }
    });
  }

  // ------------------------------------------------
  // 6. 위시리스트 (장소)
  // ------------------------------------------------
  let wishesFilter = 'all'; // 'all' | 'place' | 'food'
  function renderWishes() {
    const container = $('#screen-wishes .list-body');
    const all = store.data.wishes;
    const items = wishesFilter === 'all' ? all : all.filter(i => i.type === wishesFilter);

    let html = `
      <div class="filter-tabs" style="display:flex;gap:8px;margin-bottom:14px">
        <button class="chip-filter ${wishesFilter === 'all' ? 'active' : ''}" data-wishes-filter="all">전체</button>
        <button class="chip-filter ${wishesFilter === 'place' ? 'active' : ''}" data-wishes-filter="place">📍 장소</button>
        <button class="chip-filter ${wishesFilter === 'food' ? 'active' : ''}" data-wishes-filter="food">🍽 음식</button>
      </div>
    `;

    if (!items.length) {
      html += emptyState('하고 싶은 것을 담아보세요', '가고 싶은 곳도, 먹고 싶은 음식도 함께') +
        `<button class="add-btn mt-16" data-add="wishes">+ 추가하기</button>`;
      container.innerHTML = html;
      return;
    }

    html += `<div class="list">`;
    items.forEach(it => {
      const isPlace = it.type === 'place';
      const mapHtml = isPlace
        ? (it.mapUrl
            ? `<a href="${escapeHtml(it.mapUrl)}" target="_blank" rel="noopener" class="map-link">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                지도에서 보기
              </a>`
            : `<button class="map-link" data-map="${escapeHtml(it.title)}">🗺 지도 검색</button>`)
        : '';
      html += `
        <div class="list-item" id="item-${it.id}">
          <div class="item-header">
            <div class="item-body">
              <span class="type-badge ${isPlace ? 'type-place' : 'type-food'}">${isPlace ? '📍 장소' : '🍽 음식'}</span>
              <div class="item-title" style="margin-top:4px">${escapeHtml(it.title)}</div>
              ${it.desc ? `<div class="item-desc">${escapeHtml(it.desc)}</div>` : ''}
              <div class="item-foot">${metaLine(it)}${mapHtml}</div>
            </div>
            ${itemActions('wishes', it.id)}
          </div>
        </div>
      `;
    });
    html += `</div><button class="add-btn mt-16" data-add="wishes">+ 추가하기</button>`;
    container.innerHTML = html;
  }

  function openWishesModal(existing) {
    openModal({
      title: existing ? '수정' : '하고 싶은 것 추가',
      fields: [
        { key: 'type', label: '유형', type: 'select', options: [
          { v: 'place', l: '📍 가고 싶은 곳' },

  // ------------------------------------------------
  // 14. 모달 (동적 폼)
  // ------------------------------------------------
  function openModal({ title, fields, onSubmit, submitLabel }) {
    const overlay = $('#modalOverlay');
    const body = $('#modalBody');
    const fieldsHtml = fields.map(f => {
      if (f.type === 'select') {
        return `
          <div class="field">
            <label>${escapeHtml(f.label)}</label>
            <select data-k="${f.key}">
              ${f.options.map(o => `<option value="${escapeHtml(o.v)}" ${String(o.v) === String(f.value) ? 'selected' : ''}>${escapeHtml(o.l)}</option>`).join('')}
            </select>
          </div>`;
      }
      if (f.type === 'textarea') {
        return `
          <div class="field">
            <label>${escapeHtml(f.label)}</label>
            <textarea data-k="${f.key}" ${f.rows ? `rows="${f.rows}"` : ''} placeholder="${escapeHtml(f.placeholder || '')}">${escapeHtml(f.value || '')}</textarea>
          </div>`;
      }
      return `
        <div class="field">
          <label>${escapeHtml(f.label)}</label>
          <input data-k="${f.key}" type="${f.type}" placeholder="${escapeHtml(f.placeholder || '')}" value="${escapeHtml(f.value || '')}" />
        </div>`;
    }).join('');

    body.innerHTML = `
      <div class="modal-handle"></div>
      <div class="modal-title">${escapeHtml(title)}</div>
      ${fieldsHtml}
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">취소</button>
        <button class="btn btn-primary" id="modalSubmit">${escapeHtml(submitLabel || '저장')}</button>
      </div>
    `;

    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';

    $('#modalCancel').addEventListener('click', closeModal);
    $('#modalSubmit').addEventListener('click', () => {
      const vals = {};
      let hasError = false;
      fields.forEach(f => {
        const el = body.querySelector(`[data-k="${f.key}"]`);
        vals[f.key] = el ? el.value.trim() : '';
        if (f.required && !vals[f.key]) {
          el.style.borderColor = 'var(--critical)';
          hasError = true;
        }
      });
      if (hasError) { toast('필수 항목을 입력해주세요'); return; }
      onSubmit(vals);
      closeModal();
    });
  }

  function closeModal() {
    $('#modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  // ------------------------------------------------
  // 15. 이벤트 위임
  // ------------------------------------------------
  document.addEventListener('click', (e) => {
    const t = e.target.closest('[data-tab]');
    if (t) {
      navigate(t.dataset.tab);
      return;
    }

    const subTab = e.target.closest('[data-subtab]');
    if (subTab) {
      navigate(subTab.dataset.subtab);
      return;
    }

    const back = e.target.closest('#headerBack');
    if (back) { navigate('home'); return; }

    const menu = e.target.closest('.menu-card[data-route]');
    if (menu) { navigate(menu.dataset.route); return; }

    const add = e.target.closest('[data-add]');
    if (add) {
      const s = add.dataset.add;
      if (s === 'schedule') openScheduleModal();
      else if (s === 'wishes') openWishesModal();
      else if (s === 'checklist') openChecklistModal();
      else if (s === 'budget') openBudgetModal();
      return;
    }

    const editInfo = e.target.closest('[data-edit-info]');
    if (editInfo) { openInfoModal(editInfo.dataset.editInfo); return; }

    const check = e.target.closest('[data-check]');
    if (check) { toggleCheck(check.dataset.check); return; }

    const map = e.target.closest('[data-map]');
    if (map) {
      const q = encodeURIComponent(map.dataset.map + ' 경주');
      window.open(`https://map.naver.com/p/search/${q}`, '_blank', 'noopener');
      return;
    }

    const act = e.target.closest('[data-act]');
    if (act) {
      const { act: type, section, id } = act.dataset;
      handleItemAction(type, section, id);
      return;
    }

    const settingsAction = e.target.closest('[data-action]');
    if (settingsAction) {
      handleSettingsAction(settingsAction.dataset.action);
      return;
    }

    // modal backdrop click to close
    if (e.target.id === 'modalOverlay') closeModal();
  });

  function handleItemAction(type, section, id) {
    if (type === 'edit') {
      const item = (store.data[section] || []).find(i => i.id === id);
      if (!item) return;
      if (section === 'schedule') openScheduleModal(item);
      else if (section === 'wishes') openWishesModal(item);
      else if (section === 'checklist') openChecklistModal(item);
      else if (section === 'budget') openBudgetModal(item);
    } else if (type === 'delete') {
      const arr = store.data[section];
      if (!arr) return;
      const idx = arr.findIndex(i => i.id === id);
      if (idx < 0) return;
      const item = arr[idx];
      if (!confirm(`"${item.title || item.body || '항목'}"을(를) 삭제할까요?`)) return;
      arr.splice(idx, 1);
      store.log('remove', section, item.title || (item.body ? item.body.slice(0, 20) : '항목'));
      store.save();
      toast('삭제했어요');
    }
  }

  function handleSettingsAction(action) {
    if (action === 'change-nick') {
      showOnboarding(true);
    } else if (action === 'logout') {
      if (!confirm('닉네임을 다시 등록하시겠어요?')) return;
      localStorage.removeItem(LS_ME);
      store.me = null;
      renderRoute();
    } else if (action === 'export') {
      const blob = new Blob([JSON.stringify(store.data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gyeongju-trip-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      toast('내보냈어요');
    }
  }

          </div>
          <button class="btn btn-primary btn-block" id="nickSubmit">시작하기</button>
          <div style="margin-top:16px;font-size:11px;color:var(--stone)">
            저장 모드: ${store.mode === 'firebase' ? '🟢 실시간 공유' : '🟡 로컬 저장'}
          </div>
        </div>
      </div>
    `;

    $$('.nick-chip', wrap).forEach(chip => {
      chip.addEventListener('click', () => {
        $$('.nick-chip', wrap).forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        $('#nickInput').value = chip.dataset.nick;
      });
    });

    $('#nickSubmit').addEventListener('click', () => {
      const name = $('#nickInput').value.trim();
      if (!name) { toast('닉네임을 입력해주세요'); return; }
      if (name.length > 10) { toast('10자 이내로 입력해주세요'); return; }
      store.setMe(name);
      if (isChange) {
        // 로그 남기기
      }
      navigate('home');
      renderRoute();
      toast(`${name}님 반가워요!`);
    });

    $('#nickInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#nickSubmit').click();
    });
  }

  function updateSubTabsThumb(route) {
    const thumb = $('#subTabsThumb');
    if (!thumb) return;
    const idx = CONTENT_TABS.indexOf(route);
    if (idx === -1) return;
    thumb.style.transform = `translateX(${idx * 100}%)`;
  }

  // ------------------------------------------------
  // 17. 초기화
  // ------------------------------------------------
  function initSubTabsSwipe() {
    const el = $('#subTabs');
    if (!el) return;
    let startX = 0, startY = 0, tracking = false;

    el.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      tracking = true;
    }, { passive: true });

    el.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;

      const route = currentRoute();
      const idx = CONTENT_TABS.indexOf(route);
      if (idx === -1) return;

      if (dx < 0 && idx < CONTENT_TABS.length - 1) {
        navigate(CONTENT_TABS[idx + 1]);
      } else if (dx > 0 && idx > 0) {
        navigate(CONTENT_TABS[idx - 1]);
      }
    }, { passive: true });
  }
  initSubTabsSwipe();

  window.addEventListener('hashchange', renderRoute);

  store.onChange(() => {
    // 데이터 변경 시 현재 화면 다시 그리기
    renderRoute();
  });

  store.init().then(() => {
    if (!store.me) {
      showOnboarding();
    } else {
      renderRoute();
      // 홈이 아니어도 상관없이 그리기
    }
  });

})();

  </script>
</body>
</html>
